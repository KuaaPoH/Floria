<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Camera Grid Overlay */
        .camera-grid {
            background-image: 
                linear-gradient(rgba(0, 230, 118, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Scanning Line Animation */
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            animation: scan 3s linear infinite;
        }
        
        /* Focus Corners */
        .focus-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: rgba(0, 230, 118, 0.8);
            border-style: solid;
        }
        .focus-tl { top: 20px; left: 20px; border-width: 3px 0 0 3px; border-top-left-radius: 12px; }
        .focus-tr { top: 20px; right: 20px; border-width: 3px 3px 0 0; border-top-right-radius: 12px; }
        .focus-bl { bottom: 20px; left: 20px; border-width: 0 0 3px 3px; border-bottom-left-radius: 12px; }
        .focus-br { bottom: 20px; right: 20px; border-width: 0 3px 3px 0; border-bottom-right-radius: 12px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background h-screen overflow-hidden flex flex-col font-body-md antialiased relative">
<!-- Top Bar (Task-Focused) -->
<header class="flex items-center justify-between px-container-padding py-4 z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high/50 backdrop-blur-md text-on-surface hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-title-md text-title-md text-on-surface">Quét Cây Trồng</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Central Camera View -->
<main class="flex-1 px-container-padding pb-[200px] relative z-0">
<div class="w-full h-full relative rounded-[32px] overflow-hidden shadow-[0_8px_40px_rgba(0,0,0,0.08)] border border-white/20">
<!-- Camera Feed Placeholder -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="A close-up, high-definition view of a healthy tomato plant leaf inside a modern, brightly lit futuristic greenhouse. The lighting is crisp and natural, highlighting the intricate vein structure of the bright green leaf. Soft focus background with sleek white hydroponic pipes and subtle glowing green LED grow lights. The aesthetic is clean, technological, and organic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCmEL4XENhsCnObKn0WiIWl7TfCHpwTkeVP-_CoDnSBq6kxPtxkfuNM60dF-vEcvixiLT5RuhWyw7RvdQigJok1TLl0mNbpxsprueZziuogszFFpEa0JF045c_USNDG4XurMMIc7i9GjWbyp8dyEcrkHqJW-mQrHt1SoJoN0Ikf8qlWkqPgF_a1x9_f4HQHIGFoJRaJptXYDMBobzYArS711frQqEHpnXrYwm5neOE1zRzMo2hose7RnLOjVd3BcvgcimLhi1cHkxQ')"></div>
<!-- Dark Overlay for better UI contrast -->
<div class="absolute inset-0 bg-black/20"></div>
<!-- Futuristic Grid Overlay -->
<div class="absolute inset-0 camera-grid"></div>
<!-- Focus Corners -->
<div class="focus-corner focus-tl"></div>
<div class="focus-corner focus-tr"></div>
<div class="focus-corner focus-bl"></div>
<div class="focus-corner focus-br"></div>
<!-- Animated Scanning Line -->
<div class="scan-line absolute left-0 w-full h-[2px] bg-primary-container shadow-[0_0_15px_3px_rgba(0,230,118,0.6)] z-10"></div>
<!-- Target Center -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<span class="material-symbols-outlined text-white/50 text-6xl font-light">center_focus_weak</span>
</div>
</div>
</main>
<!-- Bottom Action Sheet -->
<div class="absolute bottom-0 left-0 w-full bg-white/70 dark:bg-black/40 backdrop-blur-[40px] rounded-t-[40px] pt-8 pb-10 px-container-padding flex flex-col items-center border-t border-white/40 shadow-[0_-10px_40px_rgba(0,230,118,0.08)] z-20">
<!-- Pull Indicator (Optional but good for bottom sheets) -->
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mb-6 absolute top-3"></div>
<!-- Permission Text -->
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[280px] mb-8">
            Ứng dụng cần quyền truy cập Camera và Thư viện ảnh để nhận diện
        </p>
<!-- Capture Controls -->
<div class="w-full flex justify-around items-center px-4">
<!-- Gallery Button -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container/80 flex items-center justify-center text-on-surface-variant group-active:scale-95 transition-transform">

</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Tải ảnh lên</span>
</button>
<!-- Main Capture Button -->
<button class="relative w-24 h-24 flex items-center justify-center active:scale-95 transition-transform duration-200">
<!-- Outer Ring -->
<div class="absolute inset-0 rounded-full border-4 border-primary-container/30"></div>
<!-- Inner Button -->
<div class="w-20 h-20 rounded-full bg-primary-container shadow-[0_0_20px_rgba(0,230,118,0.4)] flex items-center justify-center">
<div class="w-16 h-16 rounded-full border-2 border-on-primary-container/20"></div>
</div>
</button>
<!-- Flash Button -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container/80 flex items-center justify-center text-on-surface-variant group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]">flash_off</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-0">Flash</span> <!-- Hidden text for layout balance -->
</button>
</div>
</div>

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 230, 118, 0.05);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid theme('colors.outline-variant');
            transition: all 0.3s ease;
        }
        
        .glass-input:focus-within {
            border-color: theme('colors.primary-container');
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.2);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .btn-glow {
            box-shadow: 0 4px 20px rgba(0, 230, 118, 0.3);
            transition: all 0.2s ease;
        }
        
        .btn-glow:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(0, 230, 118, 0.2);
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>

<body class="bg-background text-on-surface font-body-md h-screen flex flex-col justify-center items-center overflow-hidden">
<!-- Background Decor (Subtle organic shapes) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-32 -right-32 w-96 h-96 bg-primary-container/5 rounded-full blur-[80px]"></div>
<div class="absolute bottom-0 -left-32 w-80 h-80 bg-primary/5 rounded-full blur-[60px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md px-container-padding z-10 flex flex-col items-center">
<!-- Header Section -->
<div class="flex flex-col items-center mb-section-margin w-full">
<div class="w-24 h-24 mb-6 rounded-full glass-panel flex items-center justify-center overflow-hidden">
<img alt="BotaniScan Logo" class="w-20 h-20 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBSkvaUlt25sCqCbeFBqwyTPNH8fvSsSyykQRxMvOUe4_4JhvyxnbODG-O1IK02LoTaeuncN6BoS91f2pS4_92iAt-pYqEcNg4zzpVK7Zxv4g74LHJvwVAHBSPasjULmPkGbaKzmoibN0-YNq36t5fMhL2kBKmU-Vcg3mf-qWA3lWe8IPRiYq7sX20I9ruAm7ByvWa5_yWliM4PTTBRRyPuSjSYwAyDP-99UEHMsucf3cUaErnmlJJOEsH_Y5mNtDe_W6WcUBD0Ds">
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight mb-2">
                BotaniScan
            </h1>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">
                Tạo tài khoản mới
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center px-4">
                Bắt đầu hành trình xanh cùng chúng tôi.
            </p>
</div>
<!-- Registration Form -->
<form class="w-full glass-panel rounded-lg p-card-padding flex flex-col gap-stack-gap">
<!-- Full Name Input -->
<div class="glass-input rounded-[16px] flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline mr-3" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder-outline flex-1 p-0 outline-none" placeholder="Họ và Tên" type="text">
</div>
<!-- Email Input -->
<div class="glass-input rounded-[16px] flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline mr-3" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder-outline flex-1 p-0 outline-none" placeholder="Email" type="email">
</div>
<!-- Password Input -->
<div class="glass-input rounded-[16px] flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline mr-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder-outline flex-1 p-0 outline-none" placeholder="Mật khẩu" type="password">
<button class="text-outline hover:text-primary transition-colors ml-2" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Register Button -->
<button class="w-full bg-primary-container text-[#004d26] font-title-md text-title-md py-4 rounded-full mt-4 btn-glow flex justify-center items-center" type="submit">
                Đăng Ký
            </button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center font-body-md text-body-md">
<span class="text-on-surface-variant">Đã có tài khoản?</span>
<a class="text-primary font-title-md text-title-md ml-1 hover:text-primary-container transition-colors" href="#">
                Đăng nhập
            </a>
</div>
</main>
<script>
        // Simple script to toggle password visibility
        document.addEventListener('DOMContentLoaded', () => {
            const visibilityBtn = document.querySelector('button[type="button"]');
            const passwordInput = document.querySelector('input[type="password"]');
            const iconSpan = visibilityBtn.querySelector('.material-symbols-outlined');

            if(visibilityBtn && passwordInput && iconSpan) {
                visibilityBtn.addEventListener('click', () => {
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        iconSpan.textContent = 'visibility_off';
                    } else {
                        passwordInput.type = 'password';
                        iconSpan.textContent = 'visibility';
                    }
                });
            }
        });
    </script>
</body></html>

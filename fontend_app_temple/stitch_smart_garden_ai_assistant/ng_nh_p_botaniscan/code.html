<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>BotaniScan - Đăng Nhập</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",

                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#e6f1e4",
                        "error": "#ba1a1a",

                        "secondary": "#2a6b2c",

                        "surface-container-highest": "#dbe5d9",
                        "primary-fixed": "#62ff96",
                        "primary": "#006d35",
                        "secondary-container": "#acf4a4",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#ffba79",
                        "outline-variant": "#bacbb9",

                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "32px",
                        "container-padding": "20px",
                        "stack-gap": "16px",
                        "card-padding": "24px"
                    },
                    "fontFamily": {
                        "label-sm": ["Be Vietnam Pro"],
                        "title-md": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "600" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Glassmorphism Input Field Styles */
        .glass-input-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        .glass-input-container:focus-within {
            border-color: #00E676;
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.2);
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-background min-h-screen flex flex-col items-center justify-center font-body-md antialiased relative overflow-hidden">
<!-- Background Decor (Subtle gradient orbs for tech/nature feel) -->
<div class="absolute top-0 right-0 w-96 h-96 bg-primary-container/10 rounded-full blur-[100px] -translate-y-1/2 translate-x-1/2 z-0"></div>
<div class="absolute bottom-0 left-0 w-80 h-80 bg-secondary-container/10 rounded-full blur-[80px] translate-y-1/2 -translate-x-1/2 z-0"></div>
<!-- Main Content Container -->
<main class="w-full max-w-md px-container-padding z-10 flex flex-col items-center">
<!-- Logo & Brand Header -->
<header class="flex flex-col items-center mb-section-margin">
<div class="w-24 h-24 mb-stack-gap">
<img alt="BotaniScan Logo" class="w-full h-full object-contain drop-shadow-md" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBSkvaUlt25sCqCbeFBqwyTPNH8fvSsSyykQRxMvOUe4_4JhvyxnbODG-O1IK02LoTaeuncN6BoS91f2pS4_92iAt-pYqEcNg4zzpVK7Zxv4g74LHJvwVAHBSPasjULmPkGbaKzmoibN0-YNq36t5fMhL2kBKmU-Vcg3mf-qWA3lWe8IPRiYq7sX20I9ruAm7ByvWa5_yWliM4PTTBRRyPuSjSYwAyDP-99UEHMsucf3cUaErnmlJJOEsH_Y5mNtDe_W6WcUBD0Ds">
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">BotaniScan</h1>
</header>
<!-- Greeting Section -->
<div class="text-center w-full mb-section-margin">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Mừng bạn trở lại!</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Tiếp tục chăm sóc khu vườn của bạn.</p>
</div>
<!-- Login Form -->
<form class="w-full flex flex-col gap-stack-gap mb-section-margin">
<!-- Email Field -->
<div class="glass-input-container rounded-DEFAULT flex items-center px-4 py-3 bg-surface-container-low/80">
<span class="material-symbols-outlined text-on-surface-variant mr-3">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/50 font-body-md text-body-md outline-none" placeholder="Email của bạn" required="" type="email">
</div>
<!-- Password Field -->
<div class="glass-input-container rounded-DEFAULT flex items-center px-4 py-3 bg-surface-container-low/80">
<span class="material-symbols-outlined text-on-surface-variant mr-3">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/50 font-body-md text-body-md outline-none" placeholder="Mật khẩu" required="" type="password">
<button class="text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end w-full mb-2">
<a class="font-label-sm text-label-sm text-primary-container hover:text-primary transition-colors" href="#">Quên mật khẩu?</a>
</div>
<!-- Login Button -->
<button class="w-full py-4 rounded-DEFAULT bg-primary-container text-on-primary-container font-title-md text-title-md hover:bg-primary hover:text-on-primary transition-all duration-300 shadow-[0_4px_20px_rgba(0,230,118,0.2)] hover:shadow-[0_8px_24px_rgba(0,230,118,0.4)] active:scale-[0.98]" type="submit">
                Đăng Nhập
            </button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 mb-section-margin opacity-60">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Hoặc tiếp tục với</span>
<div class="flex-1 h-px bg-outline-variant"></div>
</div>
<!-- Social Login Buttons -->
<div class="w-full flex gap-4 mb-section-margin">
<!-- Google -->
<button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-DEFAULT border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low transition-colors active:scale-95" type="button">
<!-- Simple SVG for Google 'G' -->
<svg aria-hidden="true" class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-title-md text-title-md text-on-surface">Google</span>
</button>
<!-- Apple -->
<button class="flex-1 flex items-center justify-center gap-2 py-3 rounded-DEFAULT border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low transition-colors active:scale-95" type="button">
<svg aria-hidden="true" class="w-5 h-5 fill-on-surface" viewBox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.19 2.31-.88 3.5-.8 1.96.13 3.31.95 4.3 2.35-3.32 1.95-2.76 6.33.59 7.64-1.12 2.38-2.62 4.41-3.47 3.02l-.02-.04zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"></path>
</svg>
<span class="font-title-md text-title-md text-on-surface">Apple</span>
</button>
</div>
<!-- Footer Link -->
<footer class="mt-auto mb-8">
<p class="font-body-md text-body-md text-on-surface-variant">
                Chưa có tài khoản? 
                <a class="font-title-md text-title-md text-primary-container hover:text-primary transition-colors ml-1" href="#">Đăng ký ngay</a>
</p>
</footer>
</main>
</body></html>
